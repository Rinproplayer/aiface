<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tổng quan - AI Face Attendance</title>
    <link rel="stylesheet" href="/web/css/style.css">
</head>
<body>
    <div class="animated-bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
    <div class="app">
        <div id="sidebar-root"></div>

        <main class="main">
            <div class="page-top">
                <div><h1>Tổng quan</h1><p class="desc">Bảng điều khiển hệ thống điểm danh thông minh</p></div>
                <div style="display:flex;align-items:center;gap:8px"><span class="dot" id="dot"></span><span style="font-size:12px;color:var(--text-dim)">Realtime</span></div>
            </div>

            <div class="stats">
                <div class="stat s1">
                    <div class="glow"></div>
                    <div class="s-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
                    <div class="s-val" id="sStudents">0</div><div class="s-label">Sinh viên quản lý</div>
                </div>
                <div class="stat s2">
                    <div class="glow"></div>
                    <div class="s-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg></div>
                    <div class="s-val" id="sClasses">0</div><div class="s-label">Lớp học phụ trách</div>
                </div>
                <div class="stat s3">
                    <div class="glow"></div>
                    <div class="s-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
                    <div class="s-val" id="sToday">0</div><div class="s-label">Có mặt hôm nay</div>
                </div>
                <div class="stat s4">
                    <div class="glow"></div>
                    <div class="s-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><circle cx="12" cy="12" r="3"/></svg></div>
                    <div class="s-val" id="sFaces">0</div><div class="s-label">Khuôn mặt đã ĐK</div>
                </div>
            </div>

            <div class="grid-2">
                <div class="panel">
                    <div class="panel-head">
                        <h2><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Lịch sử điểm danh gần đây</h2>
                    </div>
                    <div id="recent" style="max-height: 380px; overflow-y: auto;"><div class="empty"><div class="e-icon" style="font-size:32px;opacity:.3"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><p>Chưa có hoạt động điểm danh</p></div></div>
                </div>
                <div class="panel">
                    <div class="panel-head">
                        <h2><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" style="vertical-align:-2px;margin-right:6px"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M7.76 16.24a6 6 0 0 1 0-8.49"/></svg>Bảng tin Realtime</h2>
                        <span class="dot"></span>
                    </div>
                    <div id="feed" style="max-height: 380px; overflow-y: auto;"><div class="empty"><div class="e-icon" style="font-size:32px;opacity:.3"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M7.76 16.24a6 6 0 0 1 0-8.49"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 19.07a10 10 0 0 1 0-14.14"/></svg></div><p>Đang chờ dữ liệu điểm danh realtime...</p></div></div>
                </div>
            </div>
        </main>
    </div>
    <script src="/web/js/app.js"></script><script src="/web/js/sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded',async()=>{await refreshStats();await loadRecent()});
        async function loadRecent(){
            try{
                const d=await apiCall('/api/dashboard/recent?limit=8');const c=document.getElementById('recent');
                if(!d||!d.length)return;
                c.innerHTML=d.map(i=>{
                    const ini=i.full_name.split(' ').map(w=>w[0]).join('').slice(-2);
                    return`<div class="feed-item"><div class="feed-av">${ini}</div><div class="feed-info"><div class="feed-name">${i.full_name}</div><div class="feed-sub">${i.student_code} • ${i.class_code}</div></div><div style="text-align:right">${statusBadge(i.status)}<div class="feed-time">${fmtDateTime(i.check_in_time)}</div></div></div>`;
                }).join('');
            }catch(e){}
        }
    </script>
</body>
</html>
