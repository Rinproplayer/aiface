<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - AI Face Attendance</title>
    <link rel="stylesheet" href="/web/css/style.css">
</head>
<body>
    <div class="animated-bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
    <div class="login-page">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon" style="background:var(--grad-green)"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg></div>
                <h1>Đăng ký tài khoản</h1>
                <p class="subtitle">Tạo tài khoản giảng viên mới</p>
            </div>
            <form id="regForm" onsubmit="handleRegister(event)">
                <div class="fg"><label>Tên đăng nhập *</label><input type="text" id="rUser" class="fc" placeholder="Nhập tên đăng nhập" required autofocus></div>
                <div class="fg"><label>Họ và tên *</label><input type="text" id="rName" class="fc" placeholder="Nhập họ và tên" required></div>
                <div class="fg"><label>Email</label><input type="email" id="rEmail" class="fc" placeholder="email@example.com"></div>
                <div class="fg"><label>Mật khẩu *</label><input type="password" id="rPass" class="fc" placeholder="Tối thiểu 6 ký tự" required minlength="6"></div>
                <div class="fg"><label>Xác nhận mật khẩu *</label><input type="password" id="rPass2" class="fc" placeholder="Nhập lại mật khẩu" required></div>
                <div id="regError" style="color:var(--red);font-size:12px;margin-bottom:14px;display:none"></div>
                <button type="submit" class="btn btn-green" style="width:100%;justify-content:center;padding:13px" id="regBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                    Đăng ký
                </button>
            </form>
            <p style="text-align:center;margin-top:18px;font-size:13px"><a href="/" style="color:var(--blue)">← Quay lại đăng nhập</a></p>
        </div>
    </div>
    <script>
        if(localStorage.getItem('token'))window.location.href='/dashboard';
        async function handleRegister(e){
            e.preventDefault();
            const btn=document.getElementById('regBtn'),err=document.getElementById('regError');
            const pass=document.getElementById('rPass').value,pass2=document.getElementById('rPass2').value;
            err.style.display='none';

            if(pass!==pass2){err.textContent='Mật khẩu xác nhận không khớp';err.style.display='block';return;}
            if(pass.length<6){err.textContent='Mật khẩu phải từ 6 ký tự';err.style.display='block';return;}

            btn.textContent='Đang xử lý...';btn.disabled=true;
            try{
                const r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
                    username:document.getElementById('rUser').value,
                    password:pass,
                    full_name:document.getElementById('rName').value,
                    email:document.getElementById('rEmail').value
                })});
                const d=await r.json();
                if(r.ok){
                    alert('Đăng ký thành công! Vui lòng đăng nhập.');
                    window.location.href='/';
                }else{
                    err.textContent=d.detail||'Đăng ký thất bại';err.style.display='block';
                }
            }catch(ex){err.textContent='Không thể kết nối server';err.style.display='block';}
            btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg> Đăng ký';
            btn.disabled=false;
        }
    </script>
</body>
</html>
